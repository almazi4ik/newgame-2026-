<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FORT.IO — SURVIVOR</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            display: none;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            cursor: crosshair;
            display: block;
            background: #1a2a2f;
        }
        
        /* МЕНЮ */
        #menuOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .menu-card {
            background: linear-gradient(145deg, #1a2a3a, #0f1a2a);
            border-radius: 50px;
            padding: 50px 60px;
            text-align: center;
            border: 2px solid #ffaa44;
            box-shadow: 0 0 40px rgba(255,170,68,0.3);
        }
        
        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 42px;
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        
        .nick-input {
            background: #0a0f1e;
            border: 2px solid #ffaa44;
            padding: 12px 20px;
            font-size: 18px;
            color: #ffcc88;
            border-radius: 40px;
            width: 250px;
            text-align: center;
            outline: none;
            margin: 20px 0;
        }
        
        .play-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            border: none;
            padding: 12px 35px;
            font-size: 20px;
            font-family: 'Press Start 2P', cursive;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .play-btn:hover { transform: scale(1.05); }
        
        /* ИГРОВОЙ UI */
        #gameUI {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 20;
        }
        
        .stats-panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            color: #ffdd99;
            font-size: 14px;
            font-weight: bold;
        }
        
        .resource-bar {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        
        .resource-item { display: flex; align-items: center; gap: 5px; }
        
        .inventory-panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
        }
        
        .slot {
            background: #2a2a3a;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 12px;
            text-align: center;
            pointer-events: auto;
        }
        
        .slot.active { background: #ffaa44; color: #1a1a2e; box-shadow: 0 0 10px #ffaa44; }
        
        .building-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
            pointer-events: auto;
        }
        
        .build-btn {
            background: rgba(0,0,0,0.8);
            border: 1px solid #ffaa44;
            padding: 8px 15px;
            border-radius: 30px;
            color: #ffdd99;
            cursor: pointer;
            font-size: 12px;
            transition: 0.1s;
        }
        
        .build-btn:hover { background: #ffaa44; color: black; }
        
        .health-bar {
            width: 150px;
            height: 8px;
            background: #5a2a2a;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffaa44, #ff6644);
            width: 100%;
        }
        
        @media (max-width: 800px) {
            .stats-panel { font-size: 10px; padding: 6px 12px; }
            .slot { padding: 4px 8px; font-size: 10px; }
            .build-btn { padding: 5px 10px; font-size: 10px; }
        }
    </style>
</head>
<body>

<div id="menuOverlay">
    <div class="menu-card">
        <div class="game-title">⚔️ FORT.IO ⚔️</div>
        <div style="color:#8aaacc; margin-bottom:20px;">SURVIVOR EDITION</div>
        <input type="text" id="nicknameInput" class="nick-input" placeholder="ИМЯ ВОИНА" maxlength="16">
        <br>
        <button id="playButton" class="play-btn"><i class="fas fa-axe"></i> НАЧАТЬ</button>
    </div>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="gameUI">
        <div class="stats-panel">
            <div><i class="fas fa-user"></i> <span id="playerNameLabel">ВОИН</span> ⭐ Lv.<span id="levelValue">1</span></div>
            <div class="resource-bar">
                <div class="resource-item"><i class="fas fa-tree" style="color:#6fbf6f;"></i> <span id="woodValue">0</span></div>
                <div class="resource-item"><i class="fas fa-mountain" style="color:#aaaaaa;"></i> <span id="stoneValue">0</span></div>
                <div class="resource-item"><i class="fas fa-heart" style="color:#ff6666;"></i> <span id="hpValue">100</span></div>
            </div>
            <div class="health-bar"><div class="health-fill" id="hpFill"></div></div>
        </div>
        
        <div class="inventory-panel">
            <div class="slot" id="slotWeapon">⚔️ ТОПОР<br><span id="weaponTier">1</span>⭐</div>
            <div class="slot" id="slotTool">⛏️ КИРКА<br><span id="toolTier">1</span>⭐</div>
        </div>
    </div>
    
    <div class="building-buttons">
        <div class="build-btn" id="btnWall">🧱 СТЕНА (10 дер/5 кам)</div>
        <div class="build-btn" id="btnTurret">🔫 ПУШКА (15 жел/10 кам)</div>
        <div class="build-btn" id="btnTower">🗼 БАШНЯ (20 дер/15 кам)</div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
