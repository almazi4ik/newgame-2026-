<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FORT.IO — строй и защищайся</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            position: relative;
        }
        
        /* Анимированный фон с частицами */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
        }
        
        /* МЕНЮ */
        #menuOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }
        
        .menu-card {
            background: linear-gradient(145deg, rgba(30, 40, 60, 0.95), rgba(15, 25, 40, 0.95));
            border-radius: 50px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,170,68,0.3);
            border: 1px solid rgba(255,170,68,0.5);
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 48px;
            background: linear-gradient(135deg, #ffaa44, #ff6b44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,170,68,0.5);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        
        .game-sub {
            color: #8aaacc;
            font-size: 14px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        
        .nick-input {
            background: rgba(0,0,0,0.6);
            border: 2px solid #ffaa44;
            padding: 15px 25px;
            font-size: 20px;
            font-family: 'Orbitron', monospace;
            color: #ffcc88;
            border-radius: 60px;
            width: 280px;
            text-align: center;
            outline: none;
            transition: 0.2s;
            margin-bottom: 30px;
        }
        
        .nick-input:focus {
            border-color: #ff7744;
            box-shadow: 0 0 20px rgba(255,119,68,0.4);
            transform: scale(1.02);
        }
        
        .play-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Press Start 2P', cursive;
            color: #1a1a2e;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 20px rgba(255,100,50,0.4);
            font-weight: bold;
        }
        
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255,100,50,0.7);
        }
        
        /* ИГРОВОЙ ИНТЕРФЕЙС (изначально скрыт) */
        #gameContainer {
            position: relative;
            display: none;
            z-index: 10;
        }
        
        canvas {
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            cursor: crosshair;
            display: block;
            background: #14202e;
            border: 2px solid rgba(255,170,68,0.4);
        }
        
        #gameUI {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 20;
        }
        
        .stats-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: #ffdd99;
            border-left: 4px solid #ffaa44;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            pointer-events: auto;
        }
        
        .stats-panel i {
            color: #ffaa44;
            margin-right: 8px;
        }
        
        .controls-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            color: #ccc;
            font-family: monospace;
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        
        .controls-panel span {
            margin: 0 8px;
        }
        
        .building-buttons {
            position: absolute;
            bottom: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            z-index: 20;
            pointer-events: auto;
        }
        
        .build-btn {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            padding: 12px 18px;
            border-radius: 40px;
            color: #ffdd99;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
        }
        
        .build-btn:hover {
            background: #ffaa44;
            color: #1a1a2e;
            transform: scale(1.02);
            box-shadow: 0 0 12px #ffaa44;
        }
        
        .health-bar-bg {
            width: 180px;
            height: 10px;
            background: #5a2a2a;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .health-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffaa44, #ff6644);
            width: 100%;
            border-radius: 10px;
            transition: width 0.2s;
        }
        
        @media (max-width: 800px) {
            .menu-card { padding: 30px 35px; }
            .game-title { font-size: 28px; }
            .stats-panel { font-size: 12px; padding: 6px 12px; }
            .build-btn { padding: 8px 12px; font-size: 10px; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- МЕНЮ -->
<div id="menuOverlay">
    <div class="menu-card">
        <div class="game-title">⚔️ FORT.IO ⚔️</div>
        <div class="game-sub">BUILD • DEFEND • SURVIVE</div>
        <input type="text" id="nicknameInput" class="nick-input" placeholder="ВОИН" maxlength="16" autocomplete="off">
        <br>
        <button id="playButton" class="play-btn"><i class="fas fa-play"></i> В БОЙ</button>
        <div style="margin-top: 30px; font-size: 11px; opacity: 0.6;">🏆 строй пушки • башни • стены</div>
    </div>
</div>

<!-- ИГРОВОЙ КОНТЕЙНЕР -->
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="gameUI">
        <div class="stats-panel">
            <i class="fas fa-hard-hat"></i> <span id="resourcesDisplay">0</span> блоков &nbsp;|&nbsp;
            <i class="fas fa-heart"></i> <span id="hpDisplay">100</span> HP
            <div class="health-bar-bg"><div class="health-bar-fill" id="hpFill"></div></div>
        </div>
        <div class="controls-panel">
            <span><i class="fas fa-mouse-pointer"></i> мышь</span>
            <span><i class="fas fa-1"></i> 🔫 пушка(5)</span>
            <span><i class="fas fa-2"></i> 🗼 башня(8)</span>
            <span><i class="fas fa-3"></i> 🧱 стена(3)</span>
        </div>
    </div>
    <div class="building-buttons">
        <div class="build-btn" id="btnTurretUI">🔫 ПУШКА [5]</div>
        <div class="build-btn" id="btnTowerUI">🗼 БАШНЯ [8]</div>
        <div class="build-btn" id="btnWallUI">🧱 СТЕНА [3]</div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
